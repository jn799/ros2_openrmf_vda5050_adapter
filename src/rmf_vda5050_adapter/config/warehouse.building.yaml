# Traffic-editor building map — read by building_map_server.
# Must keep the .building.yaml suffix; the server checks for it.
#
# Topology (metres, cartesian):
#
#   start(0,0) — wp1(5,0) — wp2(10,0)
#                   |
#                 wp3(5,5)
#                   |
#               charging(5,10)
#
# Vertex format : [x, y, z, name, {param: [type_id, value]}]
#   type_id: 1=string  2=int  3=double  4=bool
#
# Lane format   : [from_idx, to_idx, {param: [type_id, value]}]
#   graph_idx   : which robot fleet graph (0 = first fleet)
#   bidirectional: true creates one entry for both directions

name: warehouse
coordinate_system: cartesian_meters
levels:
  L1:
    elevation: 0.0
    vertices:
      - [0.0,  0.0,  0.0, "start",    {is_holding_point: [4, true]}]
      - [5.0,  0.0,  0.0, "wp1",      {}]
      - [10.0, 0.0,  0.0, "wp2",      {}]
      - [5.0,  5.0,  0.0, "wp3",      {}]
      - [5.0,  10.0, 0.0, "charging", {is_holding_point: [4, true], is_charger: [4, true]}]
    lanes:
      - [0, 1, {bidirectional: [4, true], graph_idx: [2, 0], speed_limit: [3, 0.0]}]
      - [1, 2, {bidirectional: [4, true], graph_idx: [2, 0], speed_limit: [3, 0.0]}]
      - [1, 3, {bidirectional: [4, true], graph_idx: [2, 0], speed_limit: [3, 0.0]}]
      - [3, 4, {bidirectional: [4, true], graph_idx: [2, 0], speed_limit: [3, 0.0]}]
    measurements: []
    models: []
    walls: []
    floors: []
lifts: {}
